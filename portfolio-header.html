<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mary Portfolio Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ece9ea;
      --paper: #fdfdfc;
      --ink: #131313;
      --muted: #666;
      --line: #e8e8e7;
      --soft: #f7f7f6;
      --green: #46d06f;
      --orange: #f6a425;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      padding: 28px;
    }
    .frame {
      max-width: 1260px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid #d6d6d4;
      border-radius: 14px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.06);
      padding: 10px 26px 30px;
      min-height: 540px;
    }

    .urlbar {
      width: 320px;
      margin: 0 auto 30px;
      text-align: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f6f6f4;
      color: #717171;
      font-size: 14px;
      letter-spacing: 0.01em;
    }

    .avatar {
      width: 126px;
      height: 126px;
      border-radius: 16px;
      background: linear-gradient(135deg, #b12800, #f05a0d 42%, #131313 42%);
      overflow: hidden;
      margin-bottom: 24px;
      position: relative;
    }
    .avatar::before {
      content: "";
      position: absolute;
      right: 16px;
      top: 18px;
      width: 64px;
      height: 92px;
      border-radius: 35px 28px 14px 16px;
      background: #111;
      filter: contrast(1.2);
    }

    h1 {
      margin: 0;
      max-width: 980px;
      font-size: clamp(44px, 5vw, 72px);
      line-height: 1.03;
      letter-spacing: -0.04em;
      font-weight: 800;
    }
    .faint {
      color: #c8c8c7;
      font-weight: 700;
    }
    .bio {
      margin: 20px 0 22px;
      max-width: 920px;
      font-size: clamp(26px, 2.1vw, 34px);
      line-height: 1.28;
      letter-spacing: -0.02em;
      color: #4e4e4e;
    }

    .actions {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }
    .audio-card {
      height: 62px;
      min-width: 620px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
    }
    .play {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff5e8;
      border: 1px solid #ffe0bb;
      color: var(--orange);
      font-size: 14px;
      line-height: 1;
      margin-top: 1px;
    }
    .wave {
      flex: 1;
      height: 16px;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      background:
        repeating-linear-gradient(
          to right,
          #0f0f0f 0 2px,
          transparent 2px 7px
        );
      opacity: 0.95;
    }
    .wave::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, #fff 88%);
    }
    .time {
      font-size: 20px;
      font-weight: 500;
      color: #8b8b8b;
    }

    .status {
      height: 62px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 22px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 28px;
      color: #5b5b5b;
      letter-spacing: -0.02em;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 5px rgba(70, 208, 111, 0.14);
    }

    @media (max-width: 980px) {
      .frame { padding: 12px 16px 24px; }
      .urlbar { width: 220px; font-size: 12px; }
      .avatar { width: 96px; height: 96px; }
      .audio-card { min-width: 0; width: 100%; }
      .status { font-size: 20px; }
      .bio { font-size: 20px; }
      h1 { font-size: clamp(30px, 7vw, 44px); }
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="urlbar">modul.so/johndoe</div>

    <section>
      <div class="avatar" aria-hidden="true"></div>
      <h1>
        Hi I'm Mary Doe - I'm a Product Designer at Webflow.
        <span class="faint">Previously at Apple.</span>
      </h1>
      <p class="bio">
        I am a seasoned product designer with 5 years of experience
        specializing in crafting creative tools solutions and empowering creatives.
      </p>

      <div class="actions">
        <div class="audio-card">
          <div class="play">▶</div>
          <div class="wave" aria-hidden="true"></div>
          <div class="time">0:32</div>
        </div>
        <div class="status">
          <span class="dot" aria-hidden="true"></span>
          <span>Available for Work</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
